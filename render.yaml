services:
  - type: web
    name: easysdr
    env: docker
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /api/metrics
    envVars:
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: easysdr-db
          property: connectionString
      - key: PROJECT_NAME
        value: EasySDR Engine
      - key: KIMI_API_KEY
        sync: false
      - key: KIMI_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: KIMI_MODEL
        value: moonshotai/kimi-k2.6
      - key: APOLLO_API_KEY
        value: mock
      - key: HUBSPOT_ACCESS_TOKEN
        value: mock
      - key: DATANYZE_API_KEY
        value: mock

databases:
  - name: easysdr-db
    plan: free
